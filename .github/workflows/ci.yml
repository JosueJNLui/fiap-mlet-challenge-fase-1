name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.7"
      - run: make install-dev
      - run: make test

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.7"
      - run: make install-dev
      - run: make lint
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile